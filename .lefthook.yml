pre-commit:
  commands:
    format:
      files: git ls-files
      glob: '*.{py}'
      run: uv run ruff format {staged_files}
      stage_fixed: true
    check:
      files: git ls-files
      glob: '*.{py, ipynb}'
      run: uv run ruff check {staged_files}
      stage_fixed: true
    clean-jupyter:
      files: git ls-files
      glob: '*.ipynb'
      run: uv run jupyter nbconvert --clear-output --inplace {staged_files}
      stage_fixed: true
    types:
      files: git ls-files
      glob: '*.py'
      run: uv run ty check {staged_files} --fix
    lychee:
      run: lychee . --suggest --max-concurrency 32 --cache --format detailed --max-cache-age 7d